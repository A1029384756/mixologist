app-id: dev.cstring.Mixologist
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: dev.cstring.Mixologist
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-run/pipewire-0
  # tray icons
  - --talk-name=org.kde.StatusNotifierWatcher
build-options:
  append-path: /usr/lib/sdk/llvm20/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
modules:
  - name: SDL3
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        commit: '1675c8267ede3d12d26a362161eed2dda0813079'
    cleanup:
      - '/bin/sdl3-config'
      - '/include'
      - '/lib/libSDL3.la'
      - '/lib/libSDL3main.a'
      - '/lib/libSDL3main.la'
      - '/lib/libSDL3_test.a'
      - '/lib/libSDL3_test.la'
      - '/lib/cmake'
      - '/share/aclocal'
      - '/lib/pkgconfig'
  - name: SDL_ttf
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL_ttf.git
        tag: release-3.2.2
    cleanup:
      - '/include'
      - '/lib/cmake'
      - '/share/aclocal'
      - '/lib/pkgconfig'
    config-opts:
      - "-DSDLTTF_PLUTOSVG_ENABLED=true"
    modules:
      - name: plutosvg
        buildsystem: cmake-ninja
        sources:
          - type: git
            url: https://github.com/sammycage/plutosvg.git
            tag: v0.0.7
  - name: SDL_image
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL_image.git
        tag: release-3.4.2
    cleanup:
      - '/include'
      - '/lib/cmake'
      - '/share/aclocal'
      - '/lib/pkgconfig'
  - name: mixologist
    buildsystem: simple
    build-commands:
      # install odin
      - mkdir -p /run/build/mixologist/odin
      - ls
      - tar -xzf odin-linux-amd64-nightly%2B2026-03-23.tar.gz -C /run/build/mixologist/odin --strip-components=1
      - rm odin-linux-amd64-nightly%2B2026-03-23.tar.gz

      # create build directory
      - mkdir -p builds
      # compile shaders
      - mkdir -p src/ui/resources/shaders/compiled
      - glslangValidator -V src/ui/resources/shaders/raw/ui.vert -o src/ui/resources/shaders/compiled/ui.vert.spv
      - glslangValidator -V src/ui/resources/shaders/raw/ui.frag -o src/ui/resources/shaders/compiled/ui.frag.spv
      # build mixologist
      - /run/build/mixologist/odin/odin build src -out:builds/mixologist -show-timings -vet-unused-variables -define:LOG_LEVEL=info -extra-linker-flags:"-Wl,-rpath,/app/lib -L/app/lib" -no-rpath
      # install binaries
      - install -Dm0755 builds/mixologist /app/bin/dev.cstring.Mixologist
      # install icons and desktop file
      - install -Dm0644 data/mixologist.svg /app/share/icons/hicolor/scalable/apps/dev.cstring.Mixologist.svg
      - install -Dm0644 data/mixologist.desktop /app/share/applications/dev.cstring.Mixologist.desktop
      - desktop-file-edit --set-key="Exec" --set-value="dev.cstring.Mixologist" --set-icon=$FLATPAK_ID /app/share/applications/dev.cstring.Mixologist.desktop

      # remove odin
      - rm -rf /run/build/mixologist/odin
    sources:
      - type: dir
        path: ..
      - type: file
        url: https://f001.backblazeb2.com/file/odin-binaries/nightly/odin-linux-amd64-nightly%2B2026-03-23.tar.gz
        sha256: 42a779b01a6777e3a05a6a0d6fb07afe20b3b3b0bbb34c180e8a47bf6d651d98
