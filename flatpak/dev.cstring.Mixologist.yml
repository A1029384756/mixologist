app-id: dev.cstring.Mixologist
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: dev.cstring.Mixologist
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-run/pipewire-0
  # tray icons
  - --talk-name=org.kde.StatusNotifierWatcher
build-options:
  append-path: /usr/lib/sdk/llvm20/bin:/usr/lib/sdk/odin
  prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
modules:
  - name: SDL3
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        commit: '1675c8267ede3d12d26a362161eed2dda0813079'
    cleanup:
      - '/bin/sdl3-config'
      - '/include'
      - '/lib/libSDL3.la'
      - '/lib/libSDL3main.a'
      - '/lib/libSDL3main.la'
      - '/lib/libSDL3_test.a'
      - '/lib/libSDL3_test.la'
      - '/lib/cmake'
      - '/share/aclocal'
      - '/lib/pkgconfig'
  - name: odin
    buildsystem: simple
    build-commands:
      - mkdir -p /app/sdk/odin
      - cp -r ./* /app/sdk/odin
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://github.com/odin-lang/Odin/releases/download/dev-2026-04/odin-linux-amd64-dev-2026-04.tar.gz
        sha256: 8bfa62d459f505609cd0343746b4116f3e6866eb2d5b4b91bb8365db72f04e47
  - name: mixologist
    buildsystem: simple
    build-options:
      append-path: /app/sdk/odin
    build-commands:
      # create build directory
      - mkdir -p builds
      # compile shaders
      - mkdir -p src/ui/resources/shaders/compiled
      - glslangValidator -V src/ui/resources/shaders/raw/ui.vert -o src/ui/resources/shaders/compiled/ui.vert.spv
      - glslangValidator -V src/ui/resources/shaders/raw/ui.frag -o src/ui/resources/shaders/compiled/ui.frag.spv
      # build mixologist
      - odin build src -out:builds/mixologist -show-timings -vet-unused-variables -define:LOG_LEVEL=info -extra-linker-flags:"-Wl,-rpath,/app/lib -L/app/lib" -no-rpath
      # install binaries
      - install -Dm0755 builds/mixologist /app/bin/dev.cstring.Mixologist
      # install icons and desktop file
      - install -Dm0644 data/mixologist.svg /app/share/icons/hicolor/scalable/apps/dev.cstring.Mixologist.svg
      - install -Dm0644 data/mixologist.desktop /app/share/applications/dev.cstring.Mixologist.desktop
      - desktop-file-edit --set-key="Exec" --set-value="dev.cstring.Mixologist" --set-icon=$FLATPAK_ID /app/share/applications/dev.cstring.Mixologist.desktop
    sources:
      - type: dir
        path: ..
