id: org.freedesktop.Sdk.Extension.odin
branch: '25.08'
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
build-extension: true
separate-locales: false
appstream-compose: false

build-options:
  prefix: /usr/lib/sdk/odin

modules:
  - name: Odin
    buildsystem: simple
    build-commands:
      - mkdir -p /usr/lib/sdk/odin
      - cp -r ./* ${FLATPAK_DEST}/
    sources:
      - type: archive
        url: https://github.com/odin-lang/Odin/releases/download/dev-2026-04/odin-linux-amd64-dev-2026-04.tar.gz
        sha256: 8bfa62d459f505609cd0343746b4116f3e6866eb2d5b4b91bb8365db72f04e47
