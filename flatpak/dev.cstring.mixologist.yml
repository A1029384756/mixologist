app-id: dev.cstring.mixologist
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: dev.cstring.mixologist
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-run/pipewire-0
  - --talk-name=org.kde.StatusNotifierWatcher
build-options:
  append-path: /usr/lib/sdk/llvm20/bin:/usr/lib/sdk/odin
  prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
modules:
  - name: SDL3
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        commit: '01a7588f8e593b93c75ca7adbc6ec595e84e9bce'
    cleanup:
      - '/bin/sdl3-config'
      - '/include'
      - '/lib/libSDL3.la'
      - '/lib/libSDL3main.a'
      - '/lib/libSDL3main.la'
      - '/lib/libSDL3_test.a'
      - '/lib/libSDL3_test.la'
      - '/lib/cmake'
      - '/share/aclocal'
      - '/lib/pkgconfig'
  - name: odin
    buildsystem: simple
    build-commands:
      - mkdir -p /app/sdk/odin
      - cp -r ./* /app/sdk/odin
    cleanup:
      - '*'
    sources:
      - type: archive
        url: https://github.com/odin-lang/Odin/releases/download/dev-2026-04/odin-linux-amd64-dev-2026-04.tar.gz
        sha256: 8bfa62d459f505609cd0343746b4116f3e6866eb2d5b4b91bb8365db72f04e47
        only-arches:
          - x86_64
      - type: archive
        url: https://github.com/odin-lang/Odin/releases/download/dev-2026-04/odin-linux-arm64-dev-2026-04.tar.gz
        sha256: ac3bd75e71ddacc67f34540f20f73c9e7e301d51333d8e040c390abac32f5bac
        only-arches:
          - aarch64
  - name: mixologist
    buildsystem: simple
    build-options:
      append-path: /app/sdk/odin
    build-commands:
      - make install EXTRA_ODIN_FLAGS='-extra-linker-flags:"-Wl,-rpath,/app/lib -L/app/lib" -no-rpath' PREFIX='/app' APP_ID=$FLATPAK_ID
      - desktop-file-edit --set-key="Exec" --set-value=$FLATPAK_ID --set-icon=$FLATPAK_ID /app/share/applications/$FLATPAK_ID.desktop
      - install -Dm0644 data/$FLATPAK_ID.metainfo.xml /app/share/metainfo/$FLATPAK_ID.metainfo.xml
    sources:
      - type: git
        url: https://github.com/A1029384756/mixologist.git
        commit: 7cc3a24971f411da5fac6c9e97bbbacb9bfa9abf
