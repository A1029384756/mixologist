on:
  push:
    branches:
      - master
  pull_request:
enable-email-notifications: true

jobs:
  build:
    runs-on: node-lts
    steps:
      - uses: actions/checkout@v6
      - name: Install Repo Dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            glslang-tools meson clang libpipewire-0.3-0 \
            libdbus-1-dev libsdl3-dev libsdl3-ttf-dev \
            libsdl3-image-dev
      - name: Install PlutoSVG
        run: |
          git clone --depth 1 https://github.com/sammycage/plutosvg.git /tmp/plutosvg
          cd /tmp/plutosvg
          meson setup build
          meson compile -C build
          meson install -C build
      - name: Install Odin (latest)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          URL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/odin-lang/Odin/releases/latest \
            | grep -oE '"browser_download_url": *"[^"]*odin-linux-amd64[^"]*\.tar\.gz"' \
            | head -1 \
            | cut -d'"' -f4)
          echo "downloading: $URL"
          curl -fsSL -o odin.tar.gz "$URL"
          mkdir -p /opt/odin
          tar -xzf odin.tar.gz -C /opt/odin --strip-components=1
          rm odin.tar.gz
          echo "/opt/odin" >> $FORGEJO_PATH
      - name: Build Mixologist
        run: make
